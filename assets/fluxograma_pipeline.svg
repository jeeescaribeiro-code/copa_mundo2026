<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Fluxograma do pipeline de dados e machine learning da Copa do Mundo 2026</title>
  <desc id="desc">Fluxo do projeto: datasets SQL, ingestao para SQLite e CSV, EDA, limpeza, selecao de features, modelagem, predicoes e artefatos finais.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #ffffff; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #dbeafe; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; filter: url(#shadow); }
      .card-title { font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; fill: #0f172a; }
      .card-text { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #475569; }
      .pill { fill: #e0f2fe; stroke: #7dd3fc; stroke-width: 1; }
      .pill-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: #075985; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .note { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.2; }
      .note-title { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #14532d; }
      .note-text { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #166534; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <rect x="0" y="0" width="1280" height="108" fill="url(#header)"/>
  <text class="title" x="54" y="48">Pipeline de Ciência de Dados e Machine Learning</text>
  <text class="subtitle" x="56" y="76">Predição de gols e resultados para a Copa do Mundo FIFA 2026 com Python, SQL, EDA, feature engineering e regressão linear</text>

  <rect class="card" x="54" y="152" width="190" height="132" rx="8"/>
  <text class="card-title" x="74" y="188">1. Dados SQL</text>
  <text class="card-text" x="74" y="218">27 scripts históricos</text>
  <text class="card-text" x="74" y="240">Jogos, gols, sedes,</text>
  <text class="card-text" x="74" y="262">campeões e prêmios</text>
  <rect class="pill" x="74" y="302" width="120" height="24" rx="12"/>
  <text class="pill-text" x="88" y="318">dataset/*.sql</text>

  <rect class="card" x="304" y="152" width="190" height="132" rx="8"/>
  <text class="card-title" x="324" y="188">2. Ingestão</text>
  <text class="card-text" x="324" y="218">Conversão MySQL</text>
  <text class="card-text" x="324" y="240">para SQLite e</text>
  <text class="card-text" x="324" y="262">exportação CSV</text>
  <rect class="pill" x="324" y="302" width="138" height="24" rx="12"/>
  <text class="pill-text" x="338" y="318">ingestao_dados.py</text>

  <rect class="card" x="554" y="152" width="190" height="132" rx="8"/>
  <text class="card-title" x="574" y="188">3. EDA</text>
  <text class="card-text" x="574" y="218">Estatísticas, padrões,</text>
  <text class="card-text" x="574" y="240">gráficos e variáveis</text>
  <text class="card-text" x="574" y="262">iniciais do torneio</text>
  <rect class="pill" x="574" y="302" width="78" height="24" rx="12"/>
  <text class="pill-text" x="592" y="318">eda.py</text>

  <rect class="card" x="804" y="152" width="190" height="132" rx="8"/>
  <text class="card-title" x="824" y="188">4. Limpeza</text>
  <text class="card-text" x="824" y="218">Padronização de</text>
  <text class="card-text" x="824" y="240">seleções, fases e</text>
  <text class="card-text" x="824" y="262">histórico acumulado</text>
  <rect class="pill" x="824" y="302" width="92" height="24" rx="12"/>
  <text class="pill-text" x="840" y="318">limpeza.py</text>

  <rect class="card" x="1054" y="152" width="190" height="132" rx="8"/>
  <text class="card-title" x="1074" y="188">5. Features</text>
  <text class="card-text" x="1074" y="218">Pearson, RFECV,</text>
  <text class="card-text" x="1074" y="240">LassoCV e VIF para</text>
  <text class="card-text" x="1074" y="262">seleção final</text>
  <rect class="pill" x="1074" y="302" width="98" height="24" rx="12"/>
  <text class="pill-text" x="1088" y="318">features.py</text>

  <path class="arrow" d="M 244 218 L 304 218"/>
  <path class="arrow" d="M 494 218 L 554 218"/>
  <path class="arrow" d="M 744 218 L 804 218"/>
  <path class="arrow" d="M 994 218 L 1054 218"/>

  <path class="arrow" d="M 1149 284 C 1149 352, 220 352, 220 410"/>

  <rect class="card" x="54" y="410" width="230" height="142" rx="8"/>
  <text class="card-title" x="74" y="446">6. Modelagem</text>
  <text class="card-text" x="74" y="476">Pipeline com StandardScaler</text>
  <text class="card-text" x="74" y="498">e LinearRegression</text>
  <text class="card-text" x="74" y="520">Target: home_score</text>
  <rect class="pill" x="74" y="568" width="92" height="24" rx="12"/>
  <text class="pill-text" x="90" y="584">modelo.py</text>

  <rect class="card" x="354" y="410" width="230" height="142" rx="8"/>
  <text class="card-title" x="374" y="446">7. Avaliação</text>
  <text class="card-text" x="374" y="476">Validação cruzada 5-folds,</text>
  <text class="card-text" x="374" y="498">holdout 80/20, R², RMSE,</text>
  <text class="card-text" x="374" y="520">MAE e análise de resíduos</text>
  <rect class="pill" x="374" y="568" width="118" height="24" rx="12"/>
  <text class="pill-text" x="388" y="584">metricas.json</text>

  <rect class="card" x="654" y="410" width="230" height="142" rx="8"/>
  <text class="card-title" x="674" y="446">8. Predição 2026</text>
  <text class="card-text" x="674" y="476">Leitura da planilha dos</text>
  <text class="card-text" x="674" y="498">grupos, cálculo de features</text>
  <text class="card-text" x="674" y="520">e previsão de gols</text>
  <rect class="pill" x="674" y="568" width="156" height="24" rx="12"/>
  <text class="pill-text" x="688" y="584">predicoes_2026.csv</text>

  <rect class="card" x="954" y="410" width="230" height="142" rx="8"/>
  <text class="card-title" x="974" y="446">9. Entregáveis</text>
  <text class="card-text" x="974" y="476">Modelo treinado, métricas,</text>
  <text class="card-text" x="974" y="498">visualizações e arquivos</text>
  <text class="card-text" x="974" y="520">para análise de negócio</text>
  <rect class="pill" x="974" y="568" width="150" height="24" rx="12"/>
  <text class="pill-text" x="988" y="584">output/*</text>

  <path class="arrow" d="M 284 481 L 354 481"/>
  <path class="arrow" d="M 584 481 L 654 481"/>
  <path class="arrow" d="M 884 481 L 954 481"/>

  <rect class="note" x="54" y="622" width="1130" height="52" rx="8"/>
  <text class="note-title" x="76" y="644">Resultado final</text>
  <text class="note-text" x="76" y="664">Projeto de portfólio com SQL, SQLite, pandas, visualização de dados, feature engineering, scikit-learn, regressão linear, validação cruzada e storytelling analítico.</text>
</svg>
